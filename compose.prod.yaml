services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OCTANE_SERVER: ${OCTANE_SERVER:-roadrunner}
      OCTANE_HOST: ${OCTANE_HOST:-0.0.0.0}
      OCTANE_PORT: ${OCTANE_PORT:-8000}
      OCTANE_WORKERS: ${OCTANE_WORKERS:-auto}
      OCTANE_TASK_WORKERS: ${OCTANE_TASK_WORKERS:-auto}
      OCTANE_MAX_REQUESTS: ${OCTANE_MAX_REQUESTS:-500}
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      REDIS_HOST: redis
      DB_HOST: pgsql
    depends_on:
      - redis
      - pgsql
    volumes:
      - storage-data:/var/www/html/storage
    networks:
      - app-network

  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan horizon
    env_file:
      - .env
    environment:
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      REDIS_HOST: redis
      DB_HOST: pgsql
    depends_on:
      - redis
      - pgsql
    volumes:
      - storage-data:/var/www/html/storage
    networks:
      - app-network

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      DB_HOST: pgsql
    depends_on:
      - redis
      - pgsql
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - app-network

  pgsql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-hackatonshik}
      POSTGRES_USER: ${DB_USERNAME:-sail}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - pgsql-data:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  redis-data:
  storage-data:
  pgsql-data:
