name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: Testing
    strategy:
      matrix:
        php-version: ['8.4', '8.5']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Reject accidental deploy-scrap files
        run: |
          if [ -f public/test.html ]; then echo "Remove public/test.html from the repository (local HTML artifact)."; exit 1; fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm i

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Add Flux Credentials Loaded From ENV
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Run Unit and Feature Tests with Coverage
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          DB_FOREIGN_KEYS: 'true'
        run: |
          mkdir -p coverage
          vendor/bin/pest --compact --testsuite=Unit,Feature \
            --coverage \
            --coverage-clover=coverage/clover.xml \
            --coverage-text=coverage/coverage.txt

      - name: Print coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage.txt ]; then
            tail -n 40 coverage/coverage.txt
          fi

      - name: Run Browser Tests
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          DB_FOREIGN_KEYS: 'true'
        run: vendor/bin/pest --compact --testsuite=Browser

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-php${{ matrix.php-version }}
          path: |
            coverage/clover.xml
            coverage/coverage.txt
          if-no-files-found: ignore
