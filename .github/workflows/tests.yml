name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: Testing
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        php-version: ['8.4', '8.5']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Reject accidental deploy-scrap files
        run: |
          if [ -f public/test.html ]; then echo "Remove public/test.html from the repository (local HTML artifact)."; exit 1; fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm i

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Clear Config and Cache
        run: |
          php artisan config:clear
          php artisan cache:clear

      - name: Build Assets
        run: npm run build

      - name: Run Unit and Feature Tests with Coverage
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          DB_FOREIGN_KEYS: 'true'
        run: |
          mkdir -p coverage
          vendor/bin/pest --compact --testsuite=Unit,Feature \
            --coverage \
            --coverage-clover=coverage/clover.xml \
            --coverage-text=coverage/coverage.txt

      - name: Print coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage.txt ]; then
            tail -n 40 coverage/coverage.txt
          fi

      - name: Upgrade Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run Browser Tests (Dusk)
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: database/dusk.sqlite
          CACHE_STORE: file
          SESSION_DRIVER: file
        run: |
          touch database/dusk.sqlite
          php artisan migrate --force --env=testing
          php artisan dusk:chrome-driver --detect
          php artisan serve --no-reload --env=testing > /dev/null 2>&1 &
          sleep 5
          php artisan dusk

      - name: Run Performance Smoke Tests (optional)
        if: github.event_name == 'pull_request'
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          DB_FOREIGN_KEYS: 'true'
          CACHE_STORE: redis
          SESSION_DRIVER: redis
          QUEUE_CONNECTION: redis
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: |
          vendor/bin/pest --compact tests/Feature/HomeIndexCacheTest.php tests/Feature/PublicProfileShowPageTest.php

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-php${{ matrix.php-version }}
          path: |
            coverage/clover.xml
            coverage/coverage.txt
          if-no-files-found: ignore
