openapi: 3.1.0
info:
  title: Hackatonshik Public Catalog API
  version: 1.0.0
  description: Read-only public catalog endpoints.
servers:
  - url: /api/v1
paths:
  /hackatons:
    get:
      summary: List public hackatons
      parameters:
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 60
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: upcoming
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated hackaton list
  /teams:
    get:
      summary: List public teams
      parameters:
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 60
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Paginated team list
  /profiles:
    get:
      summary: List public profiles
      parameters:
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 60
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Paginated public profile list
